<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe 4x4</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.4rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 1.2rem;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.15rem;
      margin-bottom: 1.2rem;
      min-height: 1.8rem;
      color: #a8dadc;
      transition: color 0.3s;
    }

    #scores {
      display: flex;
      gap: 3rem;
      margin-bottom: 1.2rem;
      font-size: 0.95rem;
    }

    .score-item { text-align: center; }
    .score-item span { display: block; font-size: 1.6rem; font-weight: bold; }
    .score-x span { color: #e94560; }
    .score-o span { color: #a8dadc; }
    .score-draw span { color: #888; }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 95px);
      grid-template-rows: repeat(4, 95px);
      gap: 7px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.taken { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #1a1f4e;
      border-color: #e94560;
      animation: pulse 0.45s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls {
      display: flex;
      gap: 1rem;
      margin-top: 1.8rem;
    }

    button {
      padding: 0.6rem 1.8rem;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #reset {
      background: #e94560;
      color: #fff;
    }
    #reset:hover { background: #c73652; transform: scale(1.05); }

    #reset-scores {
      background: #0f3460;
      color: #a8dadc;
    }
    #reset-scores:hover { background: #1a4a80; transform: scale(1.05); }

    #mode-toggle {
      background: #1a4a3a;
      color: #6ee7b7;
    }
    #mode-toggle:hover { background: #276050; transform: scale(1.05); }

    #hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #444;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div class="subtitle">4 &times; 4 &mdash; Get 4 in a row to win</div>

  <div id="scores">
    <div class="score-item score-x">X <span id="score-x">0</span></div>
    <div class="score-item score-draw">Draw <span id="score-draw">0</span></div>
    <div class="score-item score-o">O <span id="score-o">0</span></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board"></div>

  <div id="controls">
    <button id="reset">New Game</button>
    <button id="mode-toggle">vs CPU: OFF</button>
    <button id="reset-scores">Reset Scores</button>
  </div>

  <div id="hint">4x4 board &bull; 4 in a row wins</div>

  <script>
    const SIZE = 4;
    const TOTAL = SIZE * SIZE;
    const scores = { X: 0, O: 0, Draw: 0 };
    let board, current, gameOver, vsCPU;

    // Build win lines for 4x4 (need 4 in a row)
    const WINS = (() => {
      const lines = [];
      // Rows
      for (let r = 0; r < SIZE; r++) {
        const line = [];
        for (let c = 0; c < SIZE; c++) line.push(r * SIZE + c);
        lines.push(line);
      }
      // Cols
      for (let c = 0; c < SIZE; c++) {
        const line = [];
        for (let r = 0; r < SIZE; r++) line.push(r * SIZE + c);
        lines.push(line);
      }
      // Diag top-left to bottom-right
      const d1 = [];
      for (let i = 0; i < SIZE; i++) d1.push(i * SIZE + i);
      lines.push(d1);
      // Diag top-right to bottom-left
      const d2 = [];
      for (let i = 0; i < SIZE; i++) d2.push(i * SIZE + (SIZE - 1 - i));
      lines.push(d2);
      return lines;
    })();

    // DOM
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const modeBtn = document.getElementById('mode-toggle');

    let cells = [];

    function buildBoard() {
      boardEl.innerHTML = '';
      cells = [];
      for (let i = 0; i < TOTAL; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', onCellClick);
        boardEl.appendChild(cell);
        cells.push(cell);
      }
    }

    function init() {
      board = Array(TOTAL).fill(null);
      current = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      statusEl.style.color = '#a8dadc';
      statusEl.textContent = "X's turn";
    }

    function checkWinner() {
      for (const line of WINS) {
        const [a, b, c, d] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c] && board[a] === board[d]) {
          return { winner: board[a], line };
        }
      }
      if (board.every(Boolean)) return { winner: 'Draw' };
      return null;
    }

    function applyMove(i, player) {
      board[i] = player;
      cells[i].textContent = player;
      cells[i].classList.add('taken', player.toLowerCase());
    }

    function handleResult() {
      const result = checkWinner();
      if (!result) return false;

      gameOver = true;
      if (result.winner === 'Draw') {
        scores.Draw++;
        statusEl.style.color = '#888';
        statusEl.textContent = "It's a draw!";
      } else {
        scores[result.winner]++;
        statusEl.style.color = result.winner === 'X' ? '#e94560' : '#a8dadc';
        statusEl.textContent = `${result.winner} wins!`;
        result.line.forEach(idx => cells[idx].classList.add('win'));
      }
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draw').textContent = scores.Draw;
      return true;
    }

    // Simple CPU: win if possible, block if possible, else random
    function cpuMove() {
      // Try to win
      for (const line of WINS) {
        const move = findThree(line, 'O');
        if (move !== null) return move;
      }
      // Block X
      for (const line of WINS) {
        const move = findThree(line, 'X');
        if (move !== null) return move;
      }
      // Prefer center-ish cells
      const preferred = [5, 6, 9, 10, 0, 3, 12, 15];
      for (const i of preferred) {
        if (!board[i]) return i;
      }
      // Random empty
      const empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
      return empty[Math.floor(Math.random() * empty.length)];
    }

    function findThree(line, player) {
      const vals = line.map(i => board[i]);
      const count = vals.filter(v => v === player).length;
      const emptyIdx = line.find(i => board[i] === null);
      if (count === 3 && emptyIdx !== undefined) return emptyIdx;
      return null;
    }

    function onCellClick(e) {
      const i = +e.currentTarget.dataset.i;
      if (gameOver || board[i]) return;
      if (vsCPU && current === 'O') return;

      applyMove(i, current);
      if (handleResult()) return;

      current = current === 'X' ? 'O' : 'X';
      statusEl.style.color = '#a8dadc';
      statusEl.textContent = `${current}'s turn`;

      if (vsCPU && current === 'O' && !gameOver) {
        setTimeout(() => {
          const move = cpuMove();
          if (move !== null) {
            applyMove(move, 'O');
            if (handleResult()) return;
            current = 'X';
            statusEl.textContent = "X's turn";
          }
        }, 280);
      }
    }

    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = `vs CPU: ${vsCPU ? 'ON' : 'OFF'}`;
      modeBtn.style.background = vsCPU ? '#276050' : '#1a4a3a';
      init();
    });

    document.getElementById('reset').addEventListener('click', init);
    document.getElementById('reset-scores').addEventListener('click', () => {
      scores.X = scores.O = scores.Draw = 0;
      document.getElementById('score-x').textContent = 0;
      document.getElementById('score-o').textContent = 0;
      document.getElementById('score-draw').textContent = 0;
      init();
    });

    vsCPU = false;
    buildBoard();
    init();
  </script>
</body>
</html>
