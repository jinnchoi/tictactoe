<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #scores {
      display: flex;
      gap: 3rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-item { text-align: center; }
    .score-item span { display: block; font-size: 1.8rem; font-weight: bold; }
    .score-x span { color: #e94560; }
    .score-o span { color: #a8dadc; }
    .score-draw span { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-item score-x">X <span id="score-x">0</span></div>
    <div class="score-item score-draw">Draw <span id="score-draw">0</span></div>
    <div class="score-item score-o">O <span id="score-o">0</span></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diagonals
    ];

    let board, current, gameOver;
    const scores = { X: 0, O: 0, Draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: 'Draw' };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const result = checkWinner();
        if (result) {
          gameOver = true;
          if (result.winner === 'Draw') {
            scores.Draw++;
            status.textContent = "It's a draw!";
          } else {
            scores[result.winner]++;
            status.textContent = `${result.winner} wins!`;
            result.line.forEach(idx => cells[idx].classList.add('win'));
          }
          document.getElementById('score-x').textContent = scores.X;
          document.getElementById('score-o').textContent = scores.O;
          document.getElementById('score-draw').textContent = scores.Draw;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
